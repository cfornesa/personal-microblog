openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Microblogging API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: posts
    description: Post operations
  - name: comments
    description: Comment operations
  - name: users
    description: User operations
  - name: site
    description: Site-wide settings
  - name: feeds
    description: Inbound RSS / Atom feed sources and moderation queue
  - name: nav-links
    description: Owner-managed external navigation links rendered in the navbar
  - name: nav-items
    description: Unified nav-items operations (drag-and-drop reorder across external/page/system kinds)
  - name: pages
    description: Standalone CMS pages addressed at /p/:slug, orthogonal to posts
  - name: feeds-catalog
    description: Public catalog of subscribable site feeds (Atom / JSON Feed / MF2 export)
  - name: ai
    description: Opt-in AI writing assistant configuration and processing
  - name: art-pieces
    description: Owner-authored reusable interactive art pieces rendered in app-owned embeds
  - name: syndication
    description: POSSE outbound syndication — platform connections, OAuth app credentials, and syndication history
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List all posts (paginated)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: category
          schema:
            type: string
          description: Filter by category slug, or the special token "uncategorized" for posts with no assigned category. Omit or pass "all" for no filter.
        - in: query
          name: source
          schema:
            type: string
          description: Filter by source. "original" for posts with no feed source (native + deleted-source posts), or a numeric feed source ID. Omit or pass "all" for no filter.
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsPage"
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostBody"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "401":
          description: Unauthorized

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get a single post with its comments
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post with comments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostWithComments"
        "404":
          description: Not found
    patch:
      operationId: updatePost
      tags: [posts]
      summary: Update a post (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePostBody"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /posts/search:
    get:
      operationId: searchPosts
      tags: [posts]
      summary: Relevance-ranked, filterable post search (published only)
      description: |
        Free-text search over post bodies (the `content_text` shadow column,
        which is the rendered text with HTML tags stripped) plus structured
        filters. Results are ranked by `MATCH ... AGAINST` score when `q` is
        present and by recency otherwise. Always restricted to
        `status = 'published'` regardless of caller — pending feed-imports
        only surface in the moderation queue.
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Free-text query. When omitted, results fall back to newest-first.
        - in: query
          name: from
          schema:
            type: string
          description: Inclusive lower bound on `createdAt` (ISO-8601 date or datetime).
        - in: query
          name: to
          schema:
            type: string
          description: Inclusive upper bound on `createdAt` (ISO-8601 date or datetime).
        - in: query
          name: sources
          schema:
            type: string
          description: |
            Comma-separated list of `feed_sources.id` values, plus the literal
            `native` for "this site's own posts." Empty / omitted means all
            sources.
        - in: query
          name: categories
          schema:
            type: string
          description: |
            Comma-separated list of `categories.slug` values. A post matches
            when it belongs to ANY of the listed categories (OR semantics,
            mirroring `sources`). Empty / omitted means no category filter.
        - in: query
          name: author
          schema:
            type: string
          description: Case-insensitive substring match against `authorName`.
        - in: query
          name: format
          schema:
            type: string
          description: |
            Comma-separated content-format filter. Allowed: `html`, `plain`.
            Both (or neither) means no format restriction.
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchPostsPage"

  /posts/user/{userId}:
    get:
      operationId: getPostsByUser
      tags: [posts]
      summary: Get all posts by a specific user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: User's posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsPage"

  /posts/{postId}/comments:
    post:
      operationId: createComment
      tags: [comments]
      summary: Add a comment to a post
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentBody"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "401":
          description: Unauthorized

  /comments/{id}:
    patch:
      operationId: updateComment
      tags: [comments]
      summary: Update a comment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentBody"
      responses:
        "200":
          description: Updated comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deleteComment
      tags: [comments]
      summary: Delete a comment (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user profile by ID or username
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current authenticated user info
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserProfileBody"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
        "400":
          description: Invalid request (e.g. username taken)

  /users/me/ai-settings:
    get:
      operationId: getMyAiSettings
      tags: [ai]
      summary: Get owner AI writing assistant settings
      responses:
        "200":
          description: Owner-safe AI settings for all supported vendors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyAiSettings"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    patch:
      operationId: updateMyAiSettings
      tags: [ai]
      summary: Update owner AI writing assistant settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyAiSettingsBody"
      responses:
        "200":
          description: Updated safe AI settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyAiSettings"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /ai/process:
    post:
      operationId: processAiText
      tags: [ai]
      summary: Process editor content with the owner-selected AI vendor
      description: |
        Uses the owner's saved AI settings for the vendor selected in the
        editor. The request body contains editor content plus the chosen
        vendor; the model and API key come from the owner's Admin AI settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessAiTextBody"
      responses:
        "200":
          description: Expanded text result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessAiTextResponse"
        "400":
          description: Invalid request or provider configuration
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "409":
          description: Selected AI vendor is not enabled for this user
        "429":
          description: Upstream provider rate limited the request

  /art-pieces:
    get:
      operationId: listArtPieces
      tags: [art-pieces]
      summary: List the owner's reusable art pieces
      responses:
        "200":
          description: Art pieces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListArtPiecesResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    post:
      operationId: createArtPiece
      tags: [art-pieces]
      summary: Save a new reusable art piece
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArtPieceBody"
      responses:
        "201":
          description: Created art piece
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateArtPieceResponse"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /art-pieces/generate:
    post:
      operationId: generateArtPiece
      tags: [art-pieces]
      summary: Generate an unsaved art piece draft with the selected AI vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateArtPieceBody"
      responses:
        "200":
          description: Generated art piece draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedArtPieceDraft"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "409":
          description: Selected AI vendor is not enabled for this user

  /art-pieces/{id}:
    get:
      operationId: getArtPiece
      tags: [art-pieces]
      summary: Get one owner art piece and its versions
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Art piece
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtPieceDetail"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
    patch:
      operationId: updateArtPiece
      tags: [art-pieces]
      summary: Update owner-controlled art piece metadata
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateArtPieceBody"
      responses:
        "200":
          description: Updated art piece
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtPiece"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deleteArtPiece
      tags: [art-pieces]
      summary: Delete an art piece and all its versions (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /art-pieces/{id}/versions:
    post:
      operationId: createArtPieceVersion
      tags: [art-pieces]
      summary: Save a new version for an existing art piece
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArtPieceVersionBody"
      responses:
        "201":
          description: Created art piece version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateArtPieceVersionResponse"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /art-pieces/{id}/embed:
    get:
      operationId: getEmbeddedArtPiece
      tags: [art-pieces]
      summary: Get the public runtime payload for an embedded art piece
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: version
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Embedded art piece payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddedArtPiece"
        "404":
          description: Not found

  /feed/stats:
    get:
      operationId: getFeedStats
      tags: [posts]
      summary: Get feed statistics (total posts, active users today)
      responses:
        "200":
          description: Feed statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedStats"

  /media:
    post:
      operationId: uploadMedia
      tags: [posts]
      summary: Upload a media asset for a post (owner only)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "201":
          description: Uploaded media metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadedMedia"
        "400":
          description: Invalid upload
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /site-settings:
    get:
      operationId: getSiteSettings
      tags: [site]
      summary: Get site-wide settings (title, copy, palette)
      responses:
        "200":
          description: Site settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"
    patch:
      operationId: updateSiteSettings
      tags: [site]
      summary: Update site-wide settings (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSiteSettingsBody"
      responses:
        "200":
          description: Updated site settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /posts/pending:
    get:
      operationId: listPendingPosts
      tags: [feeds]
      summary: List posts awaiting moderation (owner only)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Pending queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingPostsPage"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /posts/{id}/approve:
    post:
      operationId: approvePost
      tags: [feeds]
      summary: Approve a pending post (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approval result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovePostResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
        "409":
          description: Post is not pending

  /posts/{id}/reject:
    post:
      operationId: rejectPost
      tags: [feeds]
      summary: Reject (delete) a pending post (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Rejected
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
        "409":
          description: Post is not pending

  /feed-sources/public:
    get:
      operationId: listPublicFeedSources
      tags: [feeds]
      summary: Public list of feed sources that have at least one published post
      description: >
        Returns id+name only — no feed URL or fetch state — for any visitor
        to power the source filter on the search results page.
      responses:
        "200":
          description: Public sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicFeedSourcesList"

  /feed-sources:
    get:
      operationId: listFeedSources
      tags: [feeds]
      summary: List configured RSS / Atom sources (owner only)
      responses:
        "200":
          description: Sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedSourcesList"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    post:
      operationId: createFeedSource
      tags: [feeds]
      summary: Create a new feed source (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeedSourceBody"
      responses:
        "201":
          description: Created source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedSource"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /feed-sources/{id}:
    patch:
      operationId: updateFeedSource
      tags: [feeds]
      summary: Update a feed source (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFeedSourceBody"
      responses:
        "200":
          description: Updated source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedSource"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deleteFeedSource
      tags: [feeds]
      summary: Delete a feed source (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /feed-sources/{id}/refresh:
    post:
      operationId: refreshFeedSource
      tags: [feeds]
      summary: Queue this feed source for an immediate background refresh (owner only)
      description: |
        Schedules a refresh on the background fetch worker and returns immediately.
        Outcome of the actual fetch (imported / skipped counts, upstream errors)
        lands in the source row's `last_status` / `last_error` columns and is
        visible on the next list reload. Returns `status: "ok"` when the work
        was queued; the response's `fetched` / `imported` / `skipped` counters
        are zero because the fetch has not run yet.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Refresh result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedRefreshResult"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /feed-sources/{id}/approve-all:
    post:
      operationId: approveAllFromFeedSource
      tags: [feeds]
      summary: Bulk-approve every pending post from this source (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Number of pending posts approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveAllFromFeedSourceResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /feed-sources/refresh:
    post:
      operationId: refreshAllFeedSources
      tags: [feeds]
      summary: Refresh every enabled, due source (owner cookie or X-Cron-Secret)
      parameters:
        - in: query
          name: force
          schema:
            type: string
            enum: ["1", "true"]
          description: When set, ignore each source's cadence and pull every enabled source.
      responses:
        "200":
          description: Aggregate refresh result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedRefreshSummary"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List every category with its post count
      description: |
        Public read. Returns all categories ordered by name, each enriched with
        a `postCount` of *published* posts attached to it.
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoriesList"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Invalid body
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "409":
          description: Slug already exists

  /categories/{slug}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get a single category by slug
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryWithPostCount"
        "404":
          description: Not found

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category by id (owner only)
      description: |
        Writes are keyed by the stable internal `id` rather than the
        mutable `slug` so that renames (which change the slug) do not
        race against in-flight management UI requests. Express routes
        both `GET /categories/{slug}` and `PATCH/DELETE
        /categories/{id}` on the same path pattern; method dispatch is
        unambiguous.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryBody"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Invalid body
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
        "409":
          description: Slug already exists
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category by id (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /categories/{slug}/posts:
    get:
      operationId: getCategoryPosts
      tags: [categories]
      summary: List published posts attached to a category
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Category posts page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsPage"
        "404":
          description: Not found

  /nav-links:
    get:
      operationId: listNavLinks
      tags: [nav-links]
      summary: List the owner-configured navbar links
      description: |
        Public read. Returns every visible nav link sorted ascending by
        `sortOrder`. Owners may pass `includeHidden=1` to also receive
        rows with `visible=false` (used by /admin/navigation and
        /admin/pages so the owner can manage hidden rows).
      parameters:
        - in: query
          name: includeHidden
          required: false
          schema:
            type: string
            enum: ["1"]
          description: When `1` and the caller is the owner, includes hidden rows.
      responses:
        "200":
          description: Nav-links list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NavLinksList"
    post:
      operationId: createNavLink
      tags: [nav-links]
      summary: Create a new nav link (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNavLinkBody"
      responses:
        "201":
          description: Created nav link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NavLink"
        "400":
          description: Invalid body
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /nav-links/{id}:
    patch:
      operationId: updateNavLink
      tags: [nav-links]
      summary: Update a nav link (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNavLinkBody"
      responses:
        "200":
          description: Updated nav link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NavLink"
        "400":
          description: Invalid body
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deleteNavLink
      tags: [nav-links]
      summary: Delete a nav link (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /nav-items/reorder:
    patch:
      operationId: reorderNavItems
      tags: [nav-items]
      summary: Persist a new order for nav items (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NavItemsReorderBody"
      responses:
        "200":
          description: Reordered nav items list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NavLinksList"
        "400":
          description: Invalid body
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /pages:
    get:
      operationId: listPages
      tags: [pages]
      summary: List standalone pages
      parameters:
        - in: query
          name: includeDrafts
          schema:
            type: string
          description: When `1`, also returns drafts (owner only).
      responses:
        "200":
          description: Pages list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagesList"
    post:
      operationId: createPage
      tags: [pages]
      summary: Create a new page (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePageBody"
      responses:
        "201":
          description: Created page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"
        "400":
          description: Invalid body / reserved slug / slug collision
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /pages/{slug}:
    get:
      operationId: getPageBySlug
      tags: [pages]
      summary: Fetch a single page by slug (drafts 404 for non-owners)
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"
        "404":
          description: Not found

  /pages/{id}:
    patch:
      operationId: updatePage
      tags: [pages]
      summary: Update a page (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePageBody"
      responses:
        "200":
          description: Updated page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"
        "400":
          description: Invalid body / reserved slug / slug collision
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deletePage
      tags: [pages]
      summary: Delete a page (owner only). Cascade-deletes its nav row.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /feeds:
    get:
      operationId: listSiteFeeds
      tags: [feeds-catalog]
      summary: Public catalog of subscribable site feeds
      description: |
        Hand-maintained list of the three sitewide feeds the platform
        produces (Atom, JSON Feed, MF2 export). Used by the public
        `/feeds` index page in the microblog UI.

        When called with `?category=<slug>` the response also includes
        the per-category Atom and JSON feeds; with `?page=<slug>` it
        includes the per-page Atom and JSON feeds for the matching
        published CMS page. Unknown slugs are silently ignored.
      parameters:
        - in: query
          name: category
          required: false
          schema:
            type: string
          description: Optional category slug; appends per-category feeds when set.
        - in: query
          name: page
          required: false
          schema:
            type: string
          description: Optional CMS page slug; appends per-page feeds when set.
      responses:
        "200":
          description: Site feeds list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteFeedsList"

  /media/{fileName}:
    get:
      operationId: getMedia
      tags: [posts]
      summary: Fetch an uploaded media asset
      parameters:
        - in: path
          name: fileName
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Media content
        "404":
          description: Not found

  /platform-oauth-apps:
    get:
      operationId: listPlatformOAuthApps
      tags: [syndication]
      summary: List OAuth app credential status for all supported platforms (owner only)
      description: |
        Returns one entry per OAuth-app platform (`wordpress_com`, `blogger`) with a
        `configured` flag. The actual CLIENT_ID and CLIENT_SECRET are never returned.
      responses:
        "200":
          description: OAuth app list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformOAuthAppsList"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /platform-oauth-apps/{platform}:
    put:
      operationId: upsertPlatformOAuthApp
      tags: [syndication]
      summary: Save or update OAuth app credentials for a platform (owner only)
      parameters:
        - in: path
          name: platform
          required: true
          schema:
            type: string
            enum: [wordpress_com, blogger]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertPlatformOAuthAppBody"
      responses:
        "200":
          description: Updated OAuth app status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformOAuthApp"
        "400":
          description: Invalid body or unsupported platform
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /platform-connections:
    get:
      operationId: listPlatformConnections
      tags: [syndication]
      summary: List the owner's platform connections (owner only)
      responses:
        "200":
          description: Platform connections list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformConnectionsList"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    post:
      operationId: createPlatformConnection
      tags: [syndication]
      summary: Create or update a credential-based platform connection (owner only)
      description: |
        Used for credential-based platforms (`wordpress_self`). OAuth-based
        platforms (`wordpress_com`, `medium`, `blogger`) create their
        connection via the OAuth callback route at
        `/api/platform-oauth/{platform}/start`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlatformConnectionBody"
      responses:
        "200":
          description: Updated existing connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformConnection"
        "201":
          description: Created new connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformConnection"
        "400":
          description: Invalid body or unsupported platform
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /platform-connections/{id}:
    patch:
      operationId: updatePlatformConnection
      tags: [syndication]
      summary: Enable or disable a platform connection (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchPlatformConnectionBody"
      responses:
        "200":
          description: Updated connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformConnection"
        "400":
          description: Invalid body
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      operationId: deletePlatformConnection
      tags: [syndication]
      summary: Disconnect and delete a platform connection (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /platform-connections/{id}/syndications:
    get:
      operationId: listPlatformSyndications
      tags: [syndication]
      summary: List syndication history for a platform connection (owner only)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Syndication history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostSyndicationsList"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Category:
      type: object
      description: Owner-managed taxonomy entry. Slug is the canonical identifier in URLs.
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - slug
        - name
        - createdAt
        - updatedAt

    CategoryWithPostCount:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        postCount:
          type: integer
          description: Number of published posts attached to this category.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - slug
        - name
        - postCount
        - createdAt
        - updatedAt

    CategoriesList:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryWithPostCount"
      required:
        - categories

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 191
          description: Optional. When omitted the server derives one from `name`.
        description:
          type: string
          nullable: true
      required:
        - name

    UpdateCategoryBody:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 191
        description:
          type: string
          nullable: true

    Post:
      type: object
      properties:
        id:
          type: integer
        authorId:
          type: string
        authorName:
          type: string
        authorImageUrl:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
          maxLength: 500
          description: Optional post title. Null for title-less microblog posts.
        content:
          type: string
        contentFormat:
          type: string
          enum: [plain, html]
        commentCount:
          type: integer
        sourceFeedId:
          type: integer
          nullable: true
          description: ID of the feed_sources row that imported this post (PESOS); null for owner-authored posts.
        sourceFeedName:
          type: string
          nullable: true
          description: Display name of the originating feed source (joined from feed_sources). Null for owner-authored posts.
        sourceCanonicalUrl:
          type: string
          nullable: true
          description: Permalink of the post on its origin site (PESOS attribution).
        categories:
          type: array
          description: Categories this post belongs to (owner-managed taxonomy).
          items:
            $ref: "#/components/schemas/Category"
        syndications:
          type: array
          description: Platforms this post was successfully cross-posted to (POSSE). Omitted when none.
          items:
            $ref: "#/components/schemas/PostSyndicationBadge"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - authorId
        - authorName
        - content
        - contentFormat
        - commentCount
        - categories
        - createdAt

    PostsPage:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - posts
        - total
        - page
        - limit

    SearchPost:
      type: object
      description: |
        A post in a search result list. Extends the base `Post` shape with a
        server-rendered HTML `snippet` (already escaped + wrapped in `<mark>`
        tags around matched terms) and an optional relevance `score`. The
        score is omitted when the request had no `q` parameter.
      properties:
        id:
          type: integer
        authorId:
          type: string
        authorName:
          type: string
        authorImageUrl:
          type: string
          nullable: true
        content:
          type: string
        contentFormat:
          type: string
          enum: [plain, html]
        commentCount:
          type: integer
        sourceFeedId:
          type: integer
          nullable: true
        sourceFeedName:
          type: string
          nullable: true
        sourceCanonicalUrl:
          type: string
          nullable: true
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        createdAt:
          type: string
          format: date-time
        snippet:
          type: string
          description: |
            HTML-safe excerpt of `content_text` centered on the first matched
            term, with `<mark>` tags around matched tokens. Render with
            `dangerouslySetInnerHTML` — sanitization happens server-side.
        score:
          type: number
          nullable: true
          description: MySQL FULLTEXT relevance score; omitted when `q` was empty.
      required:
        - id
        - authorId
        - authorName
        - content
        - contentFormat
        - commentCount
        - categories
        - createdAt
        - snippet

    SearchPostsPage:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/SearchPost"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        query:
          type: string
          description: Echo of the `q` parameter the server actually used (post-trim).
      required:
        - posts
        - total
        - page
        - limit
        - query

    Comment:
      type: object
      properties:
        id:
          type: integer
        postId:
          type: integer
        authorId:
          type: string
        authorName:
          type: string
        authorImageUrl:
          type: string
          nullable: true
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - postId
        - authorId
        - authorName
        - content
        - createdAt

    PostWithComments:
      type: object
      properties:
        post:
          $ref: "#/components/schemas/Post"
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
      required:
        - post
        - comments

    CreatePostBody:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
          description: Optional post title. Omit or send empty string for title-less microblog posts.
        content:
          type: string
          maxLength: 40000
        contentFormat:
          type: string
          enum: [plain, html]
        categoryIds:
          type: array
          description: |
            Optional list of `categories.id` values to attach to the new post.
            Every id must be a positive integer; any unknown or malformed id
            causes the request to fail with 400 and no post is created.
            Omitting the field (or sending an empty array) leaves the post
            uncategorized.
          items:
            type: integer
            minimum: 1
        platformIds:
          type: array
          description: |
            Optional list of `platform_connections.id` values to syndicate to
            after the post is created (POSSE). Only connections owned by the
            authenticated user and with `enabled=true` are dispatched.
            Omitting the field (or sending an empty array) skips syndication.
          items:
            type: integer
            minimum: 1
        substackSendNewsletter:
          type: boolean
          description: |
            Optional Substack-only delivery mode. When true and a selected
            Substack connection is included in `platformIds`, the post is both
            published on Substack and sent as a newsletter. Defaults to false.
      required:
        - content
        - contentFormat

    UpdatePostBody:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
          description: Optional post title. Omit to leave unchanged; send empty string to clear.
        content:
          type: string
          maxLength: 40000
        contentFormat:
          type: string
          enum: [plain, html]
        categoryIds:
          type: array
          description: |
            Replaces the post's category set. Sending an empty array clears all
            categories; omitting the field leaves the existing set untouched.
            Every id must be a positive integer; any unknown or malformed id
            causes the request to fail with 400 and the post stays unchanged.
          items:
            type: integer
            minimum: 1
      required:
        - content
        - contentFormat

    CreateCommentBody:
      type: object
      properties:
        content:
          type: string
          maxLength: 500
      required:
        - content

    UpdateCommentBody:
      type: object
      properties:
        content:
          type: string
          maxLength: 500
      required:
        - content

    UserProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        username:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        socialLinks:
          type: object
          additionalProperties:
            type: string
          nullable: true
        postCount:
          type: integer
        theme:
          type: string
          enum:
            - bauhaus
            - traditional
            - minimalist
            - academic
            - airy
            - nature
            - comfort
            - audacious
            - artistic
          nullable: true
        palette:
          type: string
          enum:
            - bauhaus
            - monochrome
            - newsprint
            - ocean
            - forest
            - sunset
            - sepia
            - high-contrast
            - pastel
          nullable: true
        colorBackground:
          type: string
          nullable: true
        colorForeground:
          type: string
          nullable: true
        colorBackgroundDark:
          type: string
          nullable: true
        colorForegroundDark:
          type: string
          nullable: true
        colorPrimary:
          type: string
          nullable: true
        colorPrimaryForeground:
          type: string
          nullable: true
        colorSecondary:
          type: string
          nullable: true
        colorSecondaryForeground:
          type: string
          nullable: true
        colorAccent:
          type: string
          nullable: true
        colorAccentForeground:
          type: string
          nullable: true
        colorMuted:
          type: string
          nullable: true
        colorMutedForeground:
          type: string
          nullable: true
        colorDestructive:
          type: string
          nullable: true
        colorDestructiveForeground:
          type: string
          nullable: true
        sourceType:
          type: string
          enum:
            - feed
          nullable: true
          description: Present only when the profile represents an external blog feed source rather than a human user.
        siteUrl:
          type: string
          nullable: true
          description: The blog's canonical site URL. Present when sourceType is "feed".
      required:
        - id
        - name
        - postCount

    UpdateUserProfileBody:
      type: object
      description: |
        Partial update to the current user's profile. Theme columns
        (`theme`, `palette`, and the 14 `color*` fields) accept an explicit
        `null` to clear the user's customization for that column, which
        makes their profile fall back to the site-wide theme value.
      properties:
        name:
          type: string
          maxLength: 255
          pattern: ".*\\S.*"
        username:
          type: string
          pattern: "^[a-zA-Z0-9_]{3,30}$"
        bio:
          type: string
          maxLength: 500
        website:
          type: string
          format: uri
        socialLinks:
          type: object
          additionalProperties:
