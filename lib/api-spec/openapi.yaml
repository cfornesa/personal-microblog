        - createdAt
        - updatedAt

    FeedSourcesList:
      type: object
      properties:
        sources:
          type: array
          items:
            $ref: "#/components/schemas/FeedSource"
      required:
        - sources

    PublicFeedSource:
      type: object
      description: Anonymous-safe digest of a feed source (id + display name only).
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
        - name

    PublicFeedSourcesList:
      type: object
      properties:
        sources:
          type: array
          items:
            $ref: "#/components/schemas/PublicFeedSource"
      required:
        - sources

    CreateFeedSourceBody:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        bio:
          type: string
          maxLength: 500
          nullable: true
          description: Optional short description shown on the feed's profile page.
        authorName:
          type: string
          maxLength: 255
          nullable: true
          description: Optional display name to use for all posts imported from this source.
        feedUrl:
          type: string
          format: uri
          maxLength: 2048
        siteUrl:
          type: string
          format: uri
          maxLength: 2048
          nullable: true
        cadence:
          type: string
          enum: [daily, weekly, monthly]
          default: daily
        enabled:
          type: boolean
          default: true
      required:
        - name
        - feedUrl

    UpdateFeedSourceBody:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        username:
          type: string
          maxLength: 30
          nullable: true
          description: Optional URL-safe handle (enables /users/@handle). Must be 2–30 lowercase letters, numbers, or underscores.
        bio:
          type: string
          maxLength: 500
          nullable: true
          description: Optional short description shown on the feed's profile page.
        authorName:
          type: string
          maxLength: 255
          nullable: true
          description: Optional display name to use for all posts imported from this source.
        feedUrl:
          type: string
          format: uri
          maxLength: 2048
        siteUrl:
          type: string
          format: uri
          maxLength: 2048
          nullable: true
        cadence:
          type: string
          enum: [daily, weekly, monthly]
        enabled:
          type: boolean

    FeedRefreshResult:
      type: object
      properties:
        sourceId:
          type: integer
        fetched:
          type: integer
        imported:
          type: integer
        skipped:
          type: integer
        status:
          type: string
          enum: [ok, error]
        error:
          type: string
          nullable: true
        alreadyInProgress:
          type: boolean
          description: |
            True when the per-source refresh endpoint was called while a
            background fetch for this source was already running. The
            endpoint returns `status: "ok"` with all counters at 0 and
            does not start a duplicate fetch.
      required:
        - sourceId
        - fetched
        - imported
        - skipped
        - status

    ApproveAllFromFeedSourceResponse:
      type: object
      properties:
        sourceId:
          type: integer
        approved:
          type: integer
          description: Number of pending posts that were flipped to published.
      required:
        - sourceId
        - approved

    FeedRefreshSummary:
      type: object
      properties:
        ranAt:
          type: string
          format: date-time
        attempted:
          type: integer
        totalFetched:
          type: integer
        totalImported:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/FeedRefreshResult"
      required:
        - ranAt
        - attempted
        - totalFetched
        - totalImported
        - results

    UpdateSiteSettingsBody:
      type: object
      properties:
        theme:
          type: string
          enum:
            - bauhaus
            - traditional
            - minimalist
            - academic
            - airy
            - nature
            - comfort
            - audacious
            - artistic
        palette:
          type: string
          enum:
            - bauhaus
            - monochrome
            - newsprint
            - ocean
            - forest
            - sunset
            - sepia
            - high-contrast
            - pastel
        siteTitle:
          type: string
          maxLength: 255
        heroHeading:
          type: string
          maxLength: 255
        heroSubheading:
          type: string
          maxLength: 1000
        aboutHeading:
          type: string
          maxLength: 255
        aboutBody:
          type: string
          maxLength: 2000
        copyrightLine:
          type: string
          maxLength: 255
        footerCredit:
          type: string
          maxLength: 255
        ctaLabel:
          type: string
          maxLength: 255
        ctaHref:
          type: string
          maxLength: 2048
        colorBackground:
          type: string
          maxLength: 64
        colorForeground:
          type: string
          maxLength: 64
        colorBackgroundDark:
          type: string
          maxLength: 64
        colorForegroundDark:
          type: string
          maxLength: 64
        colorPrimary:
          type: string
          maxLength: 64
        colorPrimaryForeground:
          type: string
          maxLength: 64
        colorSecondary:
          type: string
          maxLength: 64
        colorSecondaryForeground:
          type: string
          maxLength: 64
        colorAccent:
          type: string
          maxLength: 64
        colorAccentForeground:
          type: string
          maxLength: 64
        colorMuted:
          type: string
          maxLength: 64
        colorMutedForeground:
          type: string
          maxLength: 64
        colorDestructive:
          type: string
          maxLength: 64
        colorDestructiveForeground:
          type: string
          maxLength: 64

    PlatformConnection:
      type: object
      description: |
        An owner-managed connection to an external publishing platform.
        Encrypted credential fields are never returned; `configured: true`
        indicates a token/credential is stored.
      properties:
        id:
          type: integer
        platform:
          type: string
          enum: [wordpress_com, wordpress_self, medium, blogger, substack]
        configured:
          type: boolean
          description: True when an encrypted access token is stored for this connection.
        enabled:
          type: boolean
          description: When false, this connection is skipped during syndication dispatch.
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Platform-specific metadata (e.g. blogId, authorId, siteUrl, publicationId, authStatus).
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - platform
        - configured
        - enabled
        - createdAt
        - updatedAt

    PlatformConnectionsList:
      type: object
      properties:
        connections:
          type: array
          items:
            $ref: "#/components/schemas/PlatformConnection"
      required:
        - connections

    CreatePlatformConnectionBody:
      type: object
      description: |
        Body for credential-based platform connections (`wordpress_self`, `medium`, `substack`).
        OAuth-based platforms use the `/api/platform-oauth/{platform}/start`
        redirect flow instead.
      properties:
        platform:
          type: string
          enum: [wordpress_self, medium, substack]
        credentials:
          type: object
          description: Credentials for the target platform.
          properties:
            siteUrl:
              type: string
              format: uri
            username:
              type: string
            appPassword:
              type: string
            token:
              type: string
              description: Self-integration token (Medium only).
            sessionCookie:
              type: string
              description: Substack `connect.sid` session cookie value.
            publicationId:
              type: string
              description: Numeric Substack publication ID to target when publishing.
            publicationHost:
              type: string
              description: Substack publication hostname used for publication-scoped draft and publish writes.
      required:
        - platform

    PatchPlatformConnectionBody:
      type: object
      properties:
        enabled:
          type: boolean
          description: Set to false to pause syndication to this platform without disconnecting.

    PostSyndication:
      type: object
      description: Result of one syndication attempt for a single post + platform pair.
      properties:
        id:
          type: integer
        postId:
          type: integer
        platformConnectionId:
          type: integer
        status:
          type: string
          enum: [pending, success, failed]
        externalId:
          type: string
          nullable: true
          description: The post's ID on the external platform (when available).
        externalUrl:
          type: string
          nullable: true
          description: The post's canonical URL on the external platform.
        errorMessage:
          type: string
          nullable: true
        syncedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - postId
        - platformConnectionId
        - status
        - createdAt

    PostSyndicationsList:
      type: object
      properties:
        syndications:
          type: array
          items:
            $ref: "#/components/schemas/PostSyndication"
      required:
        - syndications

    PostSyndicationBadge:
      type: object
      description: Lightweight summary of a successful cross-post, embedded in post list responses.
      properties:
        platform:
          type: string
          enum: [wordpress_com, wordpress_self, medium, blogger, substack]
        externalUrl:
          type: string
          nullable: true
          description: The post's URL on the external platform, if available.
      required:
        - platform

    PlatformOAuthApp:
      type: object
      description: |
        Site-wide OAuth application credentials for a POSSE platform.
        CLIENT_ID and CLIENT_SECRET are stored encrypted and never returned;
        `configured: true` means both are saved and the OAuth flow can proceed.
      properties:
        platform:
          type: string
          enum: [wordpress_com, blogger]
        configured:
          type: boolean
        blogUrl:
          type: string
          nullable: true
          description: Blog URL used to scope the OAuth token (e.g. https://yourblog.wordpress.com).
      required:
        - platform
        - configured

    PlatformOAuthAppsList:
      type: object
      properties:
        apps:
          type: array
          items:
            $ref: "#/components/schemas/PlatformOAuthApp"
      required:
        - apps

    UpsertPlatformOAuthAppBody:
      type: object
      description: CLIENT_ID and CLIENT_SECRET for an OAuth platform's developer app registration.
      properties:
        clientId:
          type: string
          minLength: 1
          maxLength: 512
        clientSecret:
          type: string
          minLength: 1
          maxLength: 512
        blogUrl:
          type: string
          maxLength: 500
          description: Your blog URL (e.g. https://yourblog.wordpress.com). Used to scope the OAuth token to the correct blog.
      required:
        - clientId
        - clientSecret
