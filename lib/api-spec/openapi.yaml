    NavLink:
      type: object
      description: |
        A single navbar entry. The `kind` discriminator drives rendering:

          * `external` — `url` is an absolute external URL (Task #24).
          * `page`     — `pageId` and `pageSlug` are set; the public href
                         is `/p/<pageSlug>` resolved server-side via JOIN.
          * `system`   — built-in route (e.g. `/feeds`); the owner can
                         hide via `visible=false` but cannot delete.
      properties:
        id:
          type: integer
        label:
          type: string
          maxLength: 64
        url:
          type: string
          maxLength: 2048
        openInNewTab:
          type: boolean
        sortOrder:
          type: integer
        kind:
          type: string
          enum: [external, page, system]
        pageId:
          type: integer
          nullable: true
        pageSlug:
          type: string
          nullable: true
          description: Resolved at read time via JOIN on pages.id when kind='page'.
        visible:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - label
        - url
        - openInNewTab
        - sortOrder
        - kind
        - visible
        - createdAt
        - updatedAt

    NavLinksList:
      type: object
      properties:
        links:
          type: array
          items:
            $ref: "#/components/schemas/NavLink"
      required:
        - links

    CreateNavLinkBody:
      type: object
      properties:
        label:
          type: string
          maxLength: 64
        url:
          type: string
          maxLength: 2048
        openInNewTab:
          type: boolean
          default: true
        sortOrder:
          type: integer
          default: 0
      required:
        - label
        - url

    UpdateNavLinkBody:
      type: object
      properties:
        label:
          type: string
          maxLength: 64
        url:
          type: string
          maxLength: 2048
        openInNewTab:
          type: boolean
        sortOrder:
          type: integer
        visible:
          type: boolean

    NavItemsReorderBody:
      type: object
      description: |
        Persist a new order for every nav item. The `items` array MUST
        include every existing nav row exactly once (the server rejects
        partial reorders with `400` and lists the missing/unknown ids).
        The server applies the updates in a single transaction and
        renumbers in increments of 10 to keep gaps tidy. Clients
        typically send `sortOrder = (i+1)*10` for each item; the server
        also accepts arbitrary positive ordinals and renumbers based on
        their relative order.
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              sortOrder:
                type: integer
            required:
              - id
              - sortOrder
      required:
        - items

    Page:
      type: object
      description: |
        A standalone CMS page rendered at `/p/:slug`. Title and slug are
        independent fields; the slug is the URL key. `contentFormat` is
        always `'html'` today (the column exists for future forks that
        want plain pages). Drafts return 404 to non-owners.
      properties:
        id:
          type: integer
        slug:
          type: string
          maxLength: 96
        title:
          type: string
          maxLength: 255
        content:
          type: string
        contentFormat:
          type: string
          enum: [html]
        status:
          type: string
          enum: [draft, published]
        showInNav:
          type: boolean
        authorUserId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - slug
        - title
        - content
        - contentFormat
        - status
        - showInNav
        - createdAt
        - updatedAt

